<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PureCuts - Salon Professional Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#a855f7",
                        "background-light": "#f8f5ff",
                        "background-dark": "#191022",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex h-screen w-full flex-col overflow-x-hidden">
<!-- Top Navigation / Logo Area -->
<div class="flex items-center justify-between p-6">
<div class="flex items-center gap-2">
<div class="w-10 h-10 bg-primary rounded-xl flex items-center justify-center text-white shadow-lg shadow-primary/20">
<span class="material-symbols-outlined">content_cut</span>
</div>
<span class="text-xl font-bold tracking-tight text-slate-900 dark:text-white">PureCuts</span>
</div>
</div>
<!-- Main Content Section -->
<main class="flex-1 flex flex-col justify-center px-6 max-w-md mx-auto w-full">
<div class="mb-10 text-center sm:text-left">
<h1 class="text-slate-900 dark:text-white tracking-tight text-4xl font-bold leading-tight pb-3">
                    Welcome to <span class="text-primary">PureCuts</span>
</h1>
<p class="text-slate-600 dark:text-slate-400 text-lg font-normal leading-relaxed">
                    The dedicated platform for salon professionals. Sign in to manage your appointments and grow your business.
                </p>
</div>
<!-- Login Form -->
<div class="space-y-6">
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold uppercase tracking-wider">
                        Phone Number
                    </label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 material-symbols-outlined text-xl">call</span>
<input class="form-input flex w-full rounded-xl text-slate-900 dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-primary/20 bg-white dark:bg-slate-800/50 h-14 pl-12 pr-4 placeholder:text-slate-400 text-base font-normal transition-all" placeholder="+1 (555) 000-0000" type="tel"/>
</div>
</div>
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 px-6 rounded-xl shadow-lg shadow-primary/25 transition-all active:scale-[0.98] flex items-center justify-center gap-2">
<span>Send OTP</span>
<span class="material-symbols-outlined text-lg">arrow_forward</span>
</button>
<div class="flex items-center gap-4 py-2">
<div class="h-px flex-1 bg-slate-200 dark:bg-slate-700"></div>
<span class="text-xs text-slate-400 font-medium uppercase tracking-widest">or</span>
<div class="h-px flex-1 bg-slate-200 dark:bg-slate-700"></div>
</div>
<button class="w-full border border-primary/20 bg-white dark:bg-slate-800/30 hover:bg-primary/5 text-slate-700 dark:text-slate-200 font-semibold py-4 px-6 rounded-xl transition-all flex items-center justify-center gap-3">
<div class="w-5 h-5 flex items-center justify-center">
<svg class="w-full h-full" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
</div>
                    Continue with Google
                </button>
</div>
<p class="mt-8 text-center text-slate-500 text-sm">
                By continuing, you agree to PureCuts 
                <a class="text-primary font-medium hover:underline" href="#">Terms of Service</a> and 
                <a class="text-primary font-medium hover:underline" href="#">Privacy Policy</a>.
            </p>
</main>
<!-- Decorative Element -->
<div class="absolute bottom-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-primary/30 to-transparent"></div>
<!-- Bottom Navigation Mockup (Optional for Login Screen but requested in component list) -->
<div class="border-t border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md px-6 py-4 flex justify-around">
<a class="flex flex-col items-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">home</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined">calendar_today</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined">person</span>
</a>
</div>
</div>
</body></html>
